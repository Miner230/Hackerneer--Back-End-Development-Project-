<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Hackerneer - Inventory</title>

		<!-- Bootstrap CSS -->
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
		<link href="css/base.css" rel="stylesheet" />
		<link href="css/inventory.css" rel="stylesheet" />
	</head>

	<body class="inventory">
		<!-- Navbar -->
		<div id="navbar-placeholder"></div>

		<!-- Main Content -->
		<main class="p-4">
			<div class="container main">
				<div class="row d-flex">
					<!-- Loot roller (40%) -->
					<div class="col-md-5 loot-column">
						<div class="p-2 text-center">
							<h4 class="mb-3">Open Loot Shards</h4>
							<div class="forge-container">
								<img src="https://raw.githubusercontent.com/Miner230/ca2-images/refs/heads/main/backgrounds/forge-anvil.gif" alt="Forging loot" class="forge-image" />
								<div class="d-flex align-items-center gap-2 mb-2 mt-5">
									<!-- Claim input + button row -->
									<div class="d-flex align-items-center gap-2 mb-2">
										<button id="decreaseAmount" class="number-btn">−</button>
										<input type="number" id="claimAmountInput" min="1" max="100" value="1" class="number-input" />
										<button id="increaseAmount" class="number-btn">+</button>
										<button id="claimLootBtn" class="btn btn-warning ms-3">Claim Loot</button>
									</div>
								</div>
							</div>
						</div>
					</div>

					<!-- Inventory (60%) -->
					<div class="col-md-7 inventory-column">
						<div class="p-2">
							<h5>Your Inventory</h5>
							<div id="inventoryList">
								<div id="inventoryGrid" class="inventory-grid"></div>
							</div>
						</div>
					</div>
				</div>
			</div>
			<!-- Use Item Overlay Modal -->
			<div id="useItemOverlay" class="overlay d-none">
				<div class="overlay-content paper-box">
					<h5 id="useItemTitle">Use Item</h5>
					<p id="useItemDesc" class="mb-3"></p>
					<div class="d-flex justify-content-end">
						<button id="confirmUseBtn" class="btn btn-danger me-2">Use</button>
						<button id="cancelUseBtn" class="btn btn-secondary">Cancel</button>
					</div>
				</div>
			</div>
			<div id="claimOverlay" class="claimOverlay d-none">
				<div class="claim-overlay-content paper-box">
					<h5>Claimed Items</h5>
					<div id="claimMessage" class="text-danger fw-bold mb-2" style="display: none"></div>
					<div id="claimedItemGrid" class="inventory-grid"></div>
					<div class="d-flex justify-content-end mt-3">
						<button id="closeClaimOverlayBtn" class="btn btn-secondary">Close</button>
					</div>
				</div>
			</div>
		</main>

		<!-- Footer -->
		<div id="footer-placeholder"></div>

		<!-- JS Dependencies -->
		<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
		<!-- Core Scripts -->
		<script src="js/userAccountToggles.js"></script>
		<script>
			document.addEventListener("DOMContentLoaded", () => {
				redirectIfNotLoggedIn("login.html");
			});
		</script>
		<script src="js/getCurrentURL.js"></script>
		<script src="js/queryCmds.js"></script>
		<script src="js/navbar.js"></script>
		<script src="js/notification.js"></script>
		<script src="js/mainUtils.js"></script>
		<script src="js/inventory/getUserInventory.js"></script>
		<script src="js/inventory/getNewItem.js"></script>
	</body>
</html>
