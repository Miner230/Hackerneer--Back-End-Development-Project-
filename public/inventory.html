<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<title>Hackerneer - Inventory</title>

		<!-- Bootstrap CSS -->
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
		<link href="css/base.css" rel="stylesheet" />
		<link href="css/inventory.css" rel="stylesheet" />
		<link href="css/orientation.css" rel="stylesheet" />
	</head>

	<body class="inventory d-flex flex-column min-vh-100">
		<script src="js/gameFullscreen.js"></script>
		<script>GameFullscreen.applyPendingLayout('inventory-fullscreen');</script>
		<div id="navbar-placeholder"></div>

		<main class="flex-grow-1 d-flex flex-column">
			<div id="inventoryArena" class="inventory-arena">
				<header class="inventory-hud">
					<button type="button" class="inventory-back-btn" id="exitInventoryBtn" aria-label="Back to world map">
						← World
					</button>
					<h1 class="inventory-hud-title">Smithy</h1>
				</header>

				<div class="inventory-body">
					<div class="inventory-layout">
					<section class="inventory-craft-column">
						<header class="inventory-panel-header">
							<h4 class="inventory-panel-title mb-0">Dice Crafting</h4>
						</header>
						<div class="inventory-panel-scroll">
							<div id="equippedDicePanel" class="equipped-dice-panel">
								<div class="dice-craft-board">
									<div id="diceCraftHeader" class="dice-craft-header"></div>
									<div class="dice-socket-stage">
										<div id="diceSocketColumnLeft" class="dice-socket-column dice-socket-column--left" aria-label="Left sockets"></div>
										<div id="equippedDiceSlot" class="equipped-dice-slot rarity-common" aria-label="Equipped dice">
											<span class="equipped-dice-empty">No dice equipped</span>
										</div>
										<div id="diceSocketColumnRight" class="dice-socket-column dice-socket-column--right" aria-label="Right sockets"></div>
									</div>
								</div>
								<p class="dice-craft-hint mt-2 mb-0">Drag essences onto the die. <span class="affix-badge affix-badge--prefix">P</span> prefix · <span class="affix-badge affix-badge--suffix">S</span> suffix · drop weighting stones into sockets</p>
								<div class="dice-implicit-panel mt-3 text-start">
									<h6><span class="implicit-badge">I</span> Implicits</h6>
									<ul id="diceImplicitList" class="dice-affix-list"></ul>
								</div>
								<div class="dice-effective-stats-panel mt-3 text-start d-none">
									<h6><span class="effective-badge">Σ</span> Effective Stats</h6>
									<ul id="diceEffectiveStatsList" class="dice-affix-list"></ul>
								</div>
								<div class="dice-affix-panels mt-3 text-start">
									<div class="dice-affix-panel">
										<h6><span class="affix-badge affix-badge--prefix">P</span> Prefixes <span class="affix-cap">max 3</span></h6>
										<ul id="dicePrefixList" class="dice-affix-list"></ul>
									</div>
									<div class="dice-affix-panel">
										<h6><span class="affix-badge affix-badge--suffix">S</span> Suffixes <span class="affix-cap">max 3</span></h6>
										<ul id="diceSuffixList" class="dice-affix-list"></ul>
									</div>
								</div>
								<button id="unequipDiceBtn" class="btn btn-outline-warning mt-3 d-none">Unequip Dice</button>
							</div>
						</div>
					</section>

					<section class="inventory-items-column">
						<header class="inventory-panel-header inventory-panel-header--with-actions">
							<h5 class="inventory-panel-title mb-0">Your Inventory</h5>
							<button id="adminGrantKitBtn" type="button" class="btn btn-sm btn-outline-warning admin-grant-btn d-none">
								Grant Crafting Kit
							</button>
						</header>
						<nav class="inventory-tabs" aria-label="Inventory categories">
							<button type="button" class="inventory-tab inventory-tab--active" data-tab="all">All</button>
							<button type="button" class="inventory-tab" data-tab="dice">Dice</button>
							<button type="button" class="inventory-tab" data-tab="items">Items</button>
						</nav>
						<div class="inventory-panel-scroll">
							<div id="inventoryList">
								<div id="inventoryGrid" class="inventory-grid"></div>
							</div>
						</div>
					</section>
					</div>
				</div>

				<div id="useItemOverlay" class="overlay d-none">
					<div class="overlay-content paper-box">
						<h5 id="useItemTitle">Use Item</h5>
						<p id="useItemDesc" class="mb-3"></p>
						<div class="d-flex justify-content-end">
							<button id="confirmUseBtn" class="btn btn-danger me-2">Use</button>
							<button id="cancelUseBtn" class="btn btn-secondary">Cancel</button>
						</div>
					</div>
				</div>
				<div id="equipDiceOverlay" class="overlay d-none">
					<div class="overlay-content paper-box">
						<h5 id="equipDiceTitle">Equip Dice</h5>
						<p id="equipDiceDesc" class="mb-3"></p>
						<div class="d-flex justify-content-end">
							<button id="confirmEquipBtn" class="btn btn-warning me-2">Equip</button>
							<button id="cancelEquipBtn" class="btn btn-secondary">Cancel</button>
						</div>
					</div>
				</div>
				<div id="claimOverlay" class="claimOverlay d-none">
					<div class="claim-overlay-content paper-box">
						<h5>Claimed Items</h5>
						<div id="claimMessage" class="text-danger fw-bold mb-2" style="display: none"></div>
						<div id="claimedItemGrid" class="inventory-grid"></div>
						<div class="d-flex justify-content-end mt-3">
							<button id="closeClaimOverlayBtn" class="btn btn-secondary">Close</button>
						</div>
					</div>
				</div>
			</div>
		</main>

		<!-- Footer -->
		<div id="footer-placeholder"></div>

		<!-- JS Dependencies -->
		<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
		<!-- Core Scripts -->
		<script src="js/userAccountToggles.js"></script>
		<script>
			document.addEventListener("DOMContentLoaded", () => {
				redirectIfNotLoggedIn("login.html");
			});
		</script>
		<script src="js/getCurrentURL.js"></script>
		<script src="js/orientationLock.js"></script>
		<script src="js/queryCmds.js"></script>
		<script src="js/navbar.js"></script>
		<script src="js/gameFullscreen.js"></script>
		<script src="js/pageFullscreen.js"></script>
		<script src="js/inventory/inventoryPage.js"></script>
		<script src="js/notification.js"></script>
		<script src="js/mainUtils.js"></script>
		<script src="js/lootImages.js"></script>
		<script src="js/inventory/modifierRollTiers.js"></script>
		<script src="js/inventory/affixDisplay.js"></script>
		<script src="js/inventory/getUserInventory.js"></script>
		<script src="js/inventory/diceCraft.js"></script>
		<script src="js/inventory/diceEquip.js"></script>
	</body>
</html>
