<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<title>Hackerneer - World Map</title>

		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
		<link href="css/base.css" rel="stylesheet" />
		<link href="css/world.css" rel="stylesheet" />
		<link href="css/orientation.css" rel="stylesheet" />
	</head>

	<body class="world d-flex flex-column min-vh-100">
		<script src="js/gameFullscreen.js"></script>
		<script>GameFullscreen.applyPendingLayout('world-fullscreen');</script>
		<div id="navbar-placeholder"></div>

		<main class="flex-grow-1 d-flex flex-column">
			<div id="worldArena" class="world-arena">
				<header class="world-hud">
					<button type="button" class="world-exit-btn" id="exitWorldBtn" aria-label="Exit world map">✕</button>
					<h1 class="world-title">World Map</h1>
				</header>

				<section class="world-map-stage" aria-label="World map">
					<div class="world-map-backdrop" aria-hidden="true"></div>
					<div class="world-map-paths" aria-hidden="true"></div>

					<a href="inventory.html" class="world-poi world-poi--smithy" id="smithyPoi">
						<span class="world-poi-marker" aria-hidden="true"></span>
						<span class="world-poi-label">Smithy</span>
						<span class="world-poi-hint">Inventory &amp; crafting</span>
					</a>

					<a href="delveMap.html" class="world-poi world-poi--dungeon" id="dungeonPoi">
						<span class="world-poi-marker" aria-hidden="true"></span>
						<span class="world-poi-label">Dungeon</span>
						<span class="world-poi-hint">Explore the delve map</span>
					</a>
				</section>
			</div>
		</main>

		<div id="footer-placeholder"></div>

		<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
		<script src="js/userAccountToggles.js"></script>
		<script>
			document.addEventListener('DOMContentLoaded', () => {
				redirectIfNotLoggedIn('login.html');
			});
		</script>
		<script src="js/getCurrentURL.js"></script>
		<script src="js/orientationLock.js"></script>
		<script src="js/queryCmds.js"></script>
		<script src="js/navbar.js"></script>
		<script src="js/gameFullscreen.js"></script>
		<script src="js/pageFullscreen.js"></script>
		<script src="js/world/worldMap.js"></script>
		<script src="js/notification.js"></script>
	</body>
</html>
