<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Hackerneer - Delve</title>

		<!-- Bootstrap CSS -->
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
		<link href="css/base.css" rel="stylesheet" />
		<link href="css/dice.css" rel="stylesheet" />
		<link href="css/game.css" rel="stylesheet" />
	</head>

	<body class="delve d-flex flex-column min-vh-100">
		<!-- Navbar -->
		<div id="navbar-placeholder"></div>

		<!-- Main content wrapper (NEW main tag) -->
		<main class="flex-grow-1 d-flex flex-column">
			<!-- Delve Controls -->
			<div id="delveStartOverlay" class="delve-start-overlay d-flex">
				<div class="delve-start-box text-center position-relative">
					<a href="profile.html" class="custom-close position-absolute top-0 end-0 m-2" aria-label="Close"></a>
					<h4 id="statusMessage" class="text-white mb-3">Ready to Begin?</h4>
					<button class="btn btn-primary btn-lg" id="createDelve">Start Delve</button>
					<button class="btn btn-warning btn-lg d-none mt-3" id="startNextDelveBtn">Start Next Delve</button>
				</div>
			</div>

			<!-- Pixel Transition Overlay -->
			<div id="pixelTransitionOverlay" class="pixel-transition-overlay d-none"></div>

			<div id="mainContent" class="d-none">
				<h4 id="monsterName" class="text-white text-center mt-1"></h4>
				<div class="d-flex justify-content-center align-items-center text-white mb-1" id="monsterMeta">
					<div id="monsterLevel" class="me-3"></div>
					<div id="monsterCurrentHP"></div>
				</div>

				<div class="monster-health-bar mx-auto mb-3">
					<div id="health-fill" class="health-fill"></div>
					<div class="health-label" id="health-label">HP: 100%</div>
				</div>

				<div class="container">
					<div class="row text-center align-items-center justify-content-center delve-layout-mobile">
						<div class="col-md-4 mb-4 delve-mobile-order-2">
							<div class="dice-stats">
								<div class="dice-wrapper mb-1">
									<div class="dice-container position-relative">
										<button class="dice roll" title="Roll the dice">
											<!-- Dice faces -->
											<div class="face front"><div class="pip pip1"></div></div>
											<div class="face back">
												<div class="pip pip1"></div>
												<div class="pip pip2"></div>
												<div class="pip pip3"></div>
												<div class="pip pip4"></div>
												<div class="pip pip5"></div>
												<div class="pip pip6"></div>
											</div>
											<div class="face right">
												<div class="pip pip1"></div>
												<div class="pip pip2"></div>
												<div class="pip pip3"></div>
											</div>
											<div class="face left">
												<div class="pip pip1"></div>
												<div class="pip pip2"></div>
												<div class="pip pip3"></div>
												<div class="pip pip4"></div>
											</div>
											<div class="face top">
												<div class="pip pip1"></div>
												<div class="pip pip2"></div>
											</div>
											<div class="face bottom">
												<div class="pip pip1"></div>
												<div class="pip pip2"></div>
												<div class="pip pip3"></div>
												<div class="pip pip4"></div>
												<div class="pip pip5"></div>
											</div>
										</button>
									</div>
								</div>
								<div class="d-flex justify-content-center">
									<div id="diceResult" aria-live="polite"></div>
								</div>
							</div>
						</div>

						<div class="col-md-4 mb-4 delve-mobile-order-1">
							<div class="monster-display position-relative">
								<img id="monsterImage" class="monster-img mb-3" alt="Monster" />
								<p id="monsterDesc" class="small text-white"></p>
							</div>
						</div>

						<div class="col-md-4 mb-4 delve-mobile-order-3">
							<div class="monster-stats text-white" id="delveStats"></div>
						</div>
					</div>
				</div>
			</div>
		</main>

		<!-- Footer -->
		<div id="footer-placeholder"></div>

		<!-- JS Dependencies -->
		<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
		<script src="js/userAccountToggles.js"></script>
		<script>
			document.addEventListener("DOMContentLoaded", () => {
				redirectIfNotLoggedIn("login.html");
			});
		</script>

		<!-- Core Scripts -->
		<script src="js/getCurrentURL.js"></script>
		<script src="js/queryCmds.js"></script>
		<script src="js/navbar.js"></script>
		<script src="js/mainUtils.js"></script>
		<script src="js/delve/rollDice.js"></script>
		<script src="js/delve/delveCreator.js"></script>
		<script src="js/notification.js"></script>
	</body>
</html>
