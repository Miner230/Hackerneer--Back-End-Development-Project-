<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<title>Hackerneer - Delve</title>

		<!-- Bootstrap CSS -->
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
		<link href="css/base.css" rel="stylesheet" />
		<link href="css/dice.css" rel="stylesheet" />
		<link href="css/game.css" rel="stylesheet" />
		<link href="css/profile.css" rel="stylesheet" />
		<link href="css/orientation.css" rel="stylesheet" />
	</head>

	<body class="delve d-flex flex-column min-vh-100">
		<script src="js/gameFullscreen.js"></script>
		<script>GameFullscreen.applyPendingLayout('delve-fullscreen');</script>
		<!-- Navbar -->
		<div id="navbar-placeholder"></div>

		<main id="delvePlayArena" class="flex-grow-1 d-flex flex-column">
			<div id="delveStartOverlay" class="delve-start-overlay d-flex">
				<div class="delve-start-box text-center position-relative">
					<a href="profile.html" class="custom-close position-absolute top-0 end-0 m-2" aria-label="Close"></a>
					<h4 id="statusMessage" class="text-white mb-3">Ready to Begin?</h4>
					<button class="btn btn-primary btn-lg" id="createDelve">Start Delve</button>
				</div>
			</div>

			<div id="pixelTransitionOverlay" class="pixel-transition-overlay d-none"></div>

			<div id="mainContent" class="delve-arena d-none">
				<header class="delve-hud delve-hud-minimal">
					<button type="button" class="delve-exit-btn" id="exitDelveBtn" aria-label="Exit delve">✕</button>
				</header>

				<section class="delve-battlefield">
					<div id="delveCombatFlashLayer" class="delve-combat-flash-layer" aria-live="polite"></div>

					<div class="battlefield-layout">
						<article class="combat-unit player-unit" id="playerUnit">
							<header class="combat-unit-hud">
								<div class="combat-unit-header">
									<h2 id="playerName" class="combat-unit-name">Hacker</h2>
									<div class="combat-unit-meta">
										<span id="playerTurns" class="delve-meta-badge delve-meta-turns"></span>
										<span id="playerLevel" class="delve-meta-badge"></span>
										<span id="playerSpeed" class="delve-meta-badge"></span>
										<span id="playerDR" class="delve-meta-badge"></span>
									</div>
								</div>
								<div class="monster-health-bar delve-health-bar combat-unit-health">
									<div id="playerHealthFill" class="health-fill"></div>
									<div class="health-label" id="playerHealthLabel">HP: 100%</div>
								</div>
								<p id="playerCurrentHP" class="combat-unit-hp-text"></p>
							</header>
							<div class="combat-display player-display" id="playerDisplay">
								<img
									id="playerImage"
									class="combat-sprite player-img"
									src="https://raw.githubusercontent.com/Miner230/ca2-images/refs/heads/main/backgrounds/mage.png"
									alt="Player"
								/>
							</div>
						</article>

						<div class="dice-dock">
							<div class="dice-stats">
								<div class="dice-wrapper">
									<div class="dice-container">
										<button type="button" class="dice-roll-btn roll" title="Roll the dice" aria-label="Roll the dice">
											<div class="dice-scene">
												<div class="dice" id="diceCube">
													<div class="face face-inner face-inner-1"></div>
													<div class="face face-1">
														<div class="face-content"><span class="pip"></span></div>
													</div>
													<div class="face face-inner face-inner-2"></div>
													<div class="face face-2">
														<div class="face-content">
															<span class="pip"></span>
															<span class="pip"></span>
														</div>
													</div>
													<div class="face face-inner face-inner-3"></div>
													<div class="face face-3">
														<div class="face-content">
															<span class="pip"></span>
															<span class="pip"></span>
															<span class="pip"></span>
														</div>
													</div>
													<div class="face face-inner face-inner-4"></div>
													<div class="face face-4">
														<div class="face-content">
															<span class="pip"></span>
															<span class="pip"></span>
															<span class="pip"></span>
															<span class="pip"></span>
														</div>
													</div>
													<div class="face face-inner face-inner-5"></div>
													<div class="face face-5">
														<div class="face-content">
															<span class="pip"></span>
															<span class="pip"></span>
															<span class="pip"></span>
															<span class="pip"></span>
															<span class="pip"></span>
														</div>
													</div>
													<div class="face face-inner face-inner-6"></div>
													<div class="face face-6">
														<div class="face-content">
															<span class="pip"></span>
															<span class="pip"></span>
															<span class="pip"></span>
															<span class="pip"></span>
															<span class="pip"></span>
															<span class="pip"></span>
														</div>
													</div>
												</div>
											</div>
										</button>
									</div>
								</div>
							</div>
						</div>

						<div class="monster-column" id="monsterColumn">
							<div id="combatTargetBanner" class="combat-target-banner combat-target-banner--hidden" aria-live="polite">
								<span class="combat-target-banner__icon" aria-hidden="true">◎</span>
								<span class="combat-target-banner__label">Target</span>
								<span id="combatTargetName" class="combat-target-banner__name">—</span>
								<span class="combat-target-banner__hint">Click an enemy to change target</span>
							</div>
							<div class="monster-board-wrap" id="monsterBoardWrap">
								<button
									type="button"
									id="enemyFocusPrev"
									class="enemy-focus-nav enemy-focus-nav--prev"
									aria-label="Previous target"
									title="Previous target"
									hidden
								>
									‹
								</button>
								<div id="monsterBoard" class="monster-board" aria-label="Enemy targets"></div>
								<button
									type="button"
									id="enemyFocusNext"
									class="enemy-focus-nav enemy-focus-nav--next"
									aria-label="Next target"
									title="Next target"
									hidden
								>
									›
								</button>
							</div>
							<button
								type="button"
								id="enemyFocusBack"
								class="enemy-focus-back"
								title="Return to group view"
								hidden
							>
								Overview
							</button>
						</div>
					</div>

					<div
						id="monsterStatsSheet"
						class="monster-stats-sheet"
						aria-hidden="true"
						aria-modal="true"
						role="dialog"
						aria-labelledby="monsterStatsSheetTitle"
					>
						<div class="monster-stats-sheet-backdrop" data-close-stats></div>
						<div class="monster-stats-sheet-panel">
							<button
								type="button"
								class="monster-stats-sheet-close"
								data-close-stats
								aria-label="Close monster stats"
							>
								×
							</button>
							<header class="monster-stats-sheet-header">
								<img
									id="monsterStatsSheetPortrait"
									class="monster-stats-sheet-portrait"
									alt=""
									width="72"
									height="72"
								/>
								<div class="monster-stats-sheet-heading">
									<h2 id="monsterStatsSheetTitle" class="monster-stats-sheet-title">Monster</h2>
									<p class="monster-stats-sheet-hint">Click the monster again to close</p>
								</div>
							</header>
							<div id="monsterStatsSheetBody" class="monster-stats-sheet-body"></div>
						</div>
					</div>

					<aside id="delveCombatSidebar" class="delve-combat-sidebar is-collapsed" aria-label="Combat log panel">
						<div class="delve-combat-sidebar-panel">
							<div class="delve-combat-sidebar-header">Combat Log</div>
							<div id="delveCombatLog" class="delve-combat-log" aria-live="polite"></div>
						</div>
					</aside>
				</section>

				<footer class="delve-panel">
					<div class="delve-log-controls">
						<button
							type="button"
							id="toggleCombatLogBtn"
							class="delve-combat-log-toggle"
							aria-expanded="false"
							aria-controls="delveCombatLog"
							title="Toggle combat log"
						>
							Log
						</button>
					</div>
					<div class="delve-turn-bar" aria-live="polite">
						<p id="turnIndicator" class="turn-indicator turn-indicator--player">Your turn</p>
					</div>
				</footer>

				<div id="delveEndOverlay" class="delve-end-overlay d-none">
					<div class="delve-start-box text-center">
						<h4 id="delveEndMessage" class="text-white mb-3">Victory!</h4>
						<div class="delve-end-actions d-grid gap-2">
							<button class="btn btn-warning btn-lg" id="startNextDelveBtn">Start Next Delve</button>
							<button type="button" class="btn btn-outline-light" id="exitDelveEndBtn">Exit</button>
						</div>
					</div>
				</div>
			</div>
		</main>

		<div id="footer-placeholder"></div>

		<div
			id="confettiOverlay"
			class="level-up-overlay d-none"
			aria-hidden="true"
		>
			<canvas id="confettiCanvas"></canvas>
			<div class="level-up-box">
				<div id="confettiMessage" class="level-up-text">Level up!</div>
			</div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
		<script src="js/userAccountToggles.js"></script>
		<script>
			document.addEventListener("DOMContentLoaded", () => {
				redirectIfNotLoggedIn("login.html");
			});
		</script>

		<script src="js/getCurrentURL.js"></script>
		<script src="js/orientationLock.js"></script>
		<script src="js/queryCmds.js"></script>
		<script src="js/navbar.js"></script>
		<script src="js/gameFullscreen.js"></script>
		<script src="js/pageFullscreen.js"></script>
		<script src="js/mainUtils.js"></script>
		<script src="js/delve/modifierTierNames.js"></script>
		<script src="js/delve/diceRollAnimator.js"></script>
		<script src="js/delve/delveEnemyBoard.js"></script>
		<script src="js/delve/monsterStatsSheet.js"></script>
		<script src="js/lootImages.js"></script>
		<script src="js/delve/dungeonRunApi.js"></script>
		<script src="js/delve/rollDice.js"></script>
		<script src="js/delve/delveCreator.js"></script>
		<script src="js/notification.js"></script>
	</body>
</html>
