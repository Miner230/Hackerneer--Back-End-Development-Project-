<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Hackerneer - Register</title>
		<!-- Bootstrap CSS -->
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
			crossorigin="anonymous"
		/>
		<link href="css/base.css" rel="stylesheet" />
	</head>
	<body class="register">
		<!-- Navbar -->
		<div id="navbar-placeholder"></div>

		<!-- Main Content -->
		<main class="py-4">
			<div class="container">
				<div class="row justify-content-center mt-5">
					<div class="col-md-6 px-5">
						<h3 class="mb-4 text-center">Register</h3>
						<form id="signupForm">
							<div class="form-group mb-4">
								<label for="username">Username</label>
								<input type="text" class="form-control" id="username" required />
							</div>
							<div class="form-group mb-4">
								<label for="password">Password</label>
								<input type="password" class="form-control" id="password" required />
							</div>
							<div class="form-group mb-4">
								<label for="confirmPassword">Confirm Password</label>
								<input type="password" class="form-control" id="confirmPassword" required />
							</div>
							<button type="submit" class="btn btn-primary btn-block mb-4">Signup</button>
						</form>
						<div id="warningCard" class="card border-danger mb-3 d-none">
							<div class="card-body text-danger">
								<p id="warningText" class="card-text"></p>
							</div>
						</div>
					</div>
				</div>
			</div>
		</main>

		<!-- Footer -->
		<div id="footer-placeholder"></div>

		<!-- JS Dependencies -->
		<script
			src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
			crossorigin="anonymous"
		></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
		<script src="js/getCurrentURL.js"></script>
		<script src="js/userAccountToggles.js"></script>
		<script>
			document.addEventListener("DOMContentLoaded", () => {
				redirectIfLoggedIn("profile.html");
			});
		</script>
		<script src="js/queryCmds.js"></script>
		<script src="js/navbar.js"></script>
		<script src="js/registerUser.js"></script>
		<script src="js/notification.js"></script>
	</body>
</html>
