<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Hackerneer - Profile</title>

		<!-- Bootstrap CSS -->
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
			crossorigin="anonymous"
		/>
		<link href="css/base.css" rel="stylesheet" />
		<link href="css/profile.css" rel="stylesheet" />
	</head>

	<body class="profile">
		<!-- Navbar -->
		<div id="navbar-placeholder"></div>

		<!-- Main Content -->
		<main class="py-4">
			<div class="container" id="profileTabContainer"></div>
		</main>

		<!-- Level Up Overlay -->
		<div
			id="confettiOverlay"
			class="position-fixed top-0 start-0 w-100 h-100 d-none"
			style="z-index: 2000; background: rgba(0, 0, 0, 0.3); display: flex; justify-content: center; align-items: center"
		>
			<canvas id="confettiCanvas" class="position-absolute top-0 start-0"></canvas>
			<div id="confettiMessage" class="text-center text-light fw-bold" style="font-size: 2rem; z-index: 10">Success!</div>
		</div>

		<!-- Footer -->
		<div id="footer-placeholder"></div>

		<!-- JS Dependencies -->
		<script
			src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
			crossorigin="anonymous"
		></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>

		<!-- Core Scripts -->
		<script src="js/getCurrentURL.js"></script>
		<script src="js/queryCmds.js"></script>
		<script src="js/userAccountToggles.js"></script>
		<script>
			document.addEventListener("DOMContentLoaded", () => {
				redirectIfNotLoggedIn("login.html");
			});
		</script>
		<script src="js/navbar.js"></script>
		<script src="js/mainUtils.js"></script>
		<script src="js/profile/getSingleUserInfo.js"></script>
		<script src="js/profile/getSingleDiceInfo.js"></script>
		<script src="js/profile/profileUtils.js"></script>
		<script src="js/profile/levelUser.js"></script>
		<script src="js/notification.js"></script>
	</body>
</html>
